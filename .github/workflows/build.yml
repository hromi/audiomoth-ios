name: Build AudioMoth iOS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14        # Apple Silicon, Xcode 15 default + Xcode 16 installed

    steps:
      - uses: actions/checkout@v4

      # Pick the newest Xcode 16.x available on the runner
      - name: Select Xcode 16
        run: |
          XCODE=$(ls /Applications | grep '^Xcode_16' | sort -rV | head -1)
          echo "Using $XCODE"
          sudo xcode-select -s "/Applications/$XCODE/Contents/Developer"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml

      # Simulator build — fast, proves compilation
      - name: Build (simulator)
        run: |
          set -o pipefail
          xcodebuild \
            -project AudioMothConfig.xcodeproj \
            -scheme AudioMothConfig \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            build \
          2>&1 | grep -E "(error:|warning:|Build succeeded|FAILED|compiling)" || true

      # Device archive — unsigned IPA you can install via Sideloadly / AltStore
      - name: Archive (device, unsigned)
        run: |
          xcodebuild \
            -project AudioMothConfig.xcodeproj \
            -scheme AudioMothConfig \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -archivePath /tmp/AudioMothConfig.xcarchive \
            archive

      - name: Package IPA
        run: |
          echo "=== xcarchive contents ==="
          find /tmp/AudioMothConfig.xcarchive -name "*.app" -maxdepth 5
          APP=$(find /tmp/AudioMothConfig.xcarchive -name "*.app" -maxdepth 5 | head -1)
          echo "Using: $APP"
          mkdir -p /tmp/Payload
          cp -r "$APP" /tmp/Payload/
          cd /tmp && zip -qr AudioMothConfig.ipa Payload/
          echo "IPA size: $(du -sh /tmp/AudioMothConfig.ipa | cut -f1)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: AudioMothConfig-unsigned
          path: /tmp/AudioMothConfig.ipa
          retention-days: 30
