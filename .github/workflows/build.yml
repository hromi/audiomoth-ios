name: Build AudioMoth iOS

on:
  push:
    branches: [main]
  workflow_dispatch:            # lets you trigger a build manually from GitHub UI

jobs:
  build:
    runs-on: macos-15           # Sequoia, ships with Xcode 16

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── 2. Pin Xcode version ──────────────────────────────────────────────
      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      # ── 3. Tools ──────────────────────────────────────────────────────────
      - name: Install XcodeGen + xcbeautify
        run: brew install xcodegen xcbeautify

      # ── 4. Generate .xcodeproj from project.yml ───────────────────────────
      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml

      # ── 5. Simulator build — always runs, proves the code compiles ────────
      - name: Build for simulator
        run: |
          set -o pipefail
          xcodebuild \
            -project AudioMothConfig.xcodeproj \
            -scheme AudioMothConfig \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=18.1' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            build \
          | xcbeautify

      # ── 6. Device archive (unsigned) — produces an IPA you can sign later ─
      - name: Archive for device (unsigned)
        run: |
          set -o pipefail
          xcodebuild \
            -project AudioMothConfig.xcodeproj \
            -scheme AudioMothConfig \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -archivePath "$RUNNER_TEMP/AudioMothConfig.xcarchive" \
            archive \
          | xcbeautify

      - name: Package unsigned IPA
        run: |
          mkdir -p "$RUNNER_TEMP/Payload"
          cp -r \
            "$RUNNER_TEMP/AudioMothConfig.xcarchive/Products/Applications/AudioMothConfig.app" \
            "$RUNNER_TEMP/Payload/"
          cd "$RUNNER_TEMP"
          zip -r AudioMothConfig-unsigned.ipa Payload/

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: AudioMothConfig-unsigned
          path: ${{ runner.temp }}/AudioMothConfig-unsigned.ipa
          retention-days: 30

      # ── 7. Signed IPA — only runs when signing secrets are configured ──────
      #    (skip this block until you've added the three secrets below)
      - name: Import signing certificate
        if: ${{ secrets.CERT_P12 != '' }}
        env:
          CERT_P12: ${{ secrets.CERT_P12 }}
          CERT_PASSWORD: ${{ secrets.CERT_PASSWORD }}
        run: |
          echo "$CERT_P12" | base64 --decode > /tmp/cert.p12
          security create-keychain -p "ci" ci.keychain
          security default-keychain -s ci.keychain
          security unlock-keychain -p "ci" ci.keychain
          security import /tmp/cert.p12 \
            -k ci.keychain \
            -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/xcodebuild
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "ci" ci.keychain

      - name: Install provisioning profile
        if: ${{ secrets.PROVISIONING_PROFILE != '' }}
        env:
          PROFILE: ${{ secrets.PROVISIONING_PROFILE }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROFILE" | base64 --decode \
            > ~/Library/MobileDevice/Provisioning\ Profiles/AudioMothConfig.mobileprovision

      - name: Archive + export signed IPA
        if: ${{ secrets.CERT_P12 != '' && secrets.PROVISIONING_PROFILE != '' }}
        run: |
          set -o pipefail
          xcodebuild \
            -project AudioMothConfig.xcodeproj \
            -scheme AudioMothConfig \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/AudioMothConfig-signed.xcarchive" \
            archive \
          | xcbeautify

          xcodebuild \
            -exportArchive \
            -archivePath "$RUNNER_TEMP/AudioMothConfig-signed.xcarchive" \
            -exportPath "$RUNNER_TEMP/SignedIPA" \
            -exportOptionsPlist ExportOptions.plist \
          | xcbeautify

      - name: Upload signed IPA
        if: ${{ secrets.CERT_P12 != '' && secrets.PROVISIONING_PROFILE != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: AudioMothConfig-signed
          path: ${{ runner.temp }}/SignedIPA/*.ipa
          retention-days: 30
